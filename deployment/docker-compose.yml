version: '3.8'

services:
  server:
    build:
      context: ../server
    ports:
      - "5000:5000"
      - "1234-1254:1234-1254/udp"
    volumes:
      - ../experiments:/app/experiments
      - ../configs:/configs
      - ../server/recordings:/app/recordings
      - ../server/events:/app/events

  dashboard:
    build:
      context: ../dashboard
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_SERVER_URL=http://localhost:5000
    depends_on:
      - server

  # Single edge-node (use --cam 0 for default webcam)
  edge-node:
    build:
      context: ../edge-node
    environment:
      - SERVER_URL=http://server:5000
    volumes:
      - ../models:/models
      - ../configs:/configs
    devices:
      - "/dev/video0:/dev/video0"
    depends_on:
      - server
    profiles:
      - single

  # Multi-camera manager — replaces multiple edge-node instances
  camera-manager:
    build:
      context: ../edge-node
    entrypoint: ["python3", "camera_manager.py", "--server", "http://server:5000", "--config", "/configs/cameras.yaml"]
    environment:
      - SERVER_URL=http://server:5000
    volumes:
      - ../models:/models
      - ../configs:/configs
    devices:
      - "/dev/video0:/dev/video0"
      - "/dev/video1:/dev/video1"
      - "/dev/video2:/dev/video2"
    depends_on:
      - server
    profiles:
      - multi
