name: balanced
edge_node:
  resolution: "1280x720"
  base_fps: 10
  roi_fps: 20
  encoder:
    codec: "hevc_nvenc"
    preset: "p4"
    tune: "ll"
    bitrate: "800k"
    maxrate: "1000k"
    bufsize: "2000k"
    gop_size: 60
  detection:
    confidence_threshold: 0.5
    model_path: "../models/yolov8n.pt"
  privacy:
    blur_background: true
    blur_kernel_size: 51
server:
  port: 8080
  adaptive_streaming: true
